version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: axon-weave-postgres
    environment:
      POSTGRES_DB: axon_weave
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: axon-weave-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: axon-weave-api
    depends_on:
      - postgres
      - redis
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=axon_weave;Username=postgres;Password=postgres
      Redis__ConnectionString: redis:6379
      Storage__PublicBaseUrl: http://localhost:8080/uploads
      Jwt__SecretKey: replace-with-a-very-long-random-string-for-production
    ports:
      - "8080:8080"
    volumes:
      - uploads-data:/app/uploads

volumes:
  postgres-data:
  uploads-data:
